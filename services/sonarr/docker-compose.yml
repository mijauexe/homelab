name: sonarr
services:
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Zagreb}
    ports:
      - "8989:8989"
    volumes:
      - /srv/appdata/sonarr:/config
      - /mnt/media/tv:/tv
      - /mnt/media:/downloads
