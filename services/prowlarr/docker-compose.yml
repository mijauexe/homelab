name: prowlarr
services:
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Zagreb}
    ports:
      - "9696:9696"
    volumes:
      - /srv/appdata/prowlarr:/config
